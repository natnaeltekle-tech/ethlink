<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />
		<title>Eth-Links</title>
		<style>
			* { margin: 0; padding: 0; box-sizing: border-box; }
			html, body {
				background-color: #0B0C15;
				color: #fff;
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
				height: 100%;
				width: 100%;
				display: flex;
				align-items: center;
				justify-content: center;
			}
			.loader {
				text-align: center;
				opacity: 0;
				animation: fadeIn 0.5s ease 0.3s forwards;
			}
			.loader span {
				color: #888;
				font-size: 14px;
			}
			@keyframes fadeIn { to { opacity: 1; } }
			@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
			.pulse { animation: pulse 2s ease-in-out infinite; }
		</style>
	</head>
	<body>
		<div class="loader">
			<div class="pulse" style="margin-bottom: 16px;">
				<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#F5C518" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
					<path d="M7 20h10"/>
					<path d="M10 20c5.5-2.5.8-6.4 3-10"/>
					<path d="M9.5 9.4c1.1.8 1.8 2.2 2.3 3.7-2 .4-3.5.4-4.8-.3-1.2-.6-2.3-1.9-3-4.2 2.8-.5 4.4 0 5.5.8z"/>
					<path d="M14.1 6a7 7 0 0 0-1.1 4c1.9-.1 3.3-.6 4.3-1.4 1-1 1.6-2.3 1.7-4.6-2.7.1-4 1-4.9 2z"/>
				</svg>
			</div>
			<span class="pulse">Loading...</span>
		</div>
	</body>
</html>
