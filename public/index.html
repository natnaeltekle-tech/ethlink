<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />
		<meta name="theme-color" content="#0B0C15" />
		<title>Eth-Links</title>
		<style>
			* { margin: 0; padding: 0; box-sizing: border-box; }
			html, body {
				background-color: #0B0C15;
				color: #fff;
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
				height: 100%;
				width: 100%;
				display: flex;
				align-items: center;
				justify-content: center;
				overflow: hidden;
			}
			.loader {
				text-align: center;
				opacity: 0;
				animation: fadeIn 0.6s ease 0.2s forwards;
			}
			.brand {
				font-size: 28px;
				font-weight: 800;
				letter-spacing: -0.5px;
				background: linear-gradient(135deg, #F5C518 0%, #FFE066 50%, #F5C518 100%);
				-webkit-background-clip: text;
				-webkit-text-fill-color: transparent;
				background-clip: text;
				margin-bottom: 24px;
			}
			.spinner-ring {
				width: 36px;
				height: 36px;
				border: 3px solid rgba(245, 197, 24, 0.15);
				border-top-color: #F5C518;
				border-radius: 50%;
				animation: spin 0.9s linear infinite;
				margin: 0 auto 16px;
			}
			.tagline {
				color: rgba(255, 255, 255, 0.4);
				font-size: 13px;
				letter-spacing: 0.5px;
			}
			@keyframes fadeIn { to { opacity: 1; } }
			@keyframes spin { to { transform: rotate(360deg); } }
		</style>
	</head>
	<body>
		<div class="loader">
			<div class="brand">Eth-Links</div>
			<div class="spinner-ring"></div>
			<div class="tagline">Loading premium experience…</div>
		</div>
	</body>
</html>
