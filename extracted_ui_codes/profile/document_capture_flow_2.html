<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Document Capture Flow 2</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f5c619",
                        "background-light": "#f8f8f5",
                        "background-dark": "#221e10",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Camera overlay cutout trick */
        .camera-overlay-mask {
            box-shadow: 0 0 0 100vmax rgba(0, 0, 0, 0.75);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display text-white selection:bg-primary selection:text-background-dark">
<div class="relative flex h-screen w-full flex-col overflow-hidden bg-black group/design-root">
<!-- Simulated Camera Feed Background -->
<div class="absolute inset-0 z-0">
<img alt="Blurred dark texture representing a table surface seen through a camera lens" class="h-full w-full object-cover opacity-80" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCynwn83_WdXnNZVH7VTj1UdB87-sgSnaD4hLW19-zJqH8FWSfZk7ckCR7l8E2ozQ2B3PvEJAeZouqhi5w6jchE6DcmWttDGJhUtlWhG8EUsIxIX7AkVDVF5mtj5JslGl9yUM2mn7CQkT2E7_lxMKrX4f9hkg4rFxnbdx9OG7UN0z0ZvpaBtJ9hfVgr4Uk33NYevst5c7snolu_2mYm9wBuTx_dJCLrZiJfEKPRQ_F7GLLDbgBLAo_2zoMPsC7hIqs0yWgQSKy-xmE"/>
</div>
<!-- Camera Cutout Overlay -->
<!-- This element creates the clear rectangle and darkens the rest -->
<div class="absolute inset-0 z-10 flex flex-col items-center justify-center pointer-events-none">
<div class="relative h-[240px] w-[340px] rounded-2xl camera-overlay-mask">
<!-- Corner Guides -->
<div class="absolute -left-[2px] -top-[2px] h-8 w-8 rounded-tl-xl border-l-4 border-t-4 border-primary"></div>
<div class="absolute -right-[2px] -top-[2px] h-8 w-8 rounded-tr-xl border-r-4 border-t-4 border-primary"></div>
<div class="absolute -bottom-[2px] -left-[2px] h-8 w-8 rounded-bl-xl border-b-4 border-l-4 border-primary"></div>
<div class="absolute -bottom-[2px] -right-[2px] h-8 w-8 rounded-br-xl border-b-4 border-r-4 border-primary"></div>
<!-- Scanning Line Animation (Optional Polish) -->
<div class="absolute inset-x-4 top-0 h-0.5 bg-primary/50 shadow-[0_0_15px_rgba(245,198,25,0.8)] animate-[scan_3s_ease-in-out_infinite]"></div>
</div>
<!-- Instruction Text -->
<p class="mt-8 text-center text-slate-300 text-sm font-medium tracking-wide drop-shadow-md">
                Position your document within the frame
            </p>
</div>
<!-- Top Header Overlay -->
<div class="relative z-20 flex w-full items-center justify-between bg-gradient-to-b from-black/80 to-transparent p-4 pb-12">
<button class="flex size-10 items-center justify-center rounded-full bg-white/10 backdrop-blur-md transition-colors active:bg-white/20">
<span class="material-symbols-outlined text-white">arrow_back</span>
</button>
<h2 class="text-white text-lg font-bold leading-tight tracking-tight">Verification</h2>
<button class="flex size-10 items-center justify-center rounded-full bg-white/10 backdrop-blur-md transition-colors active:bg-white/20">
<span class="material-symbols-outlined text-white">flash_on</span>
</button>
</div>
<!-- Spacer to push content down -->
<div class="flex-1"></div>
<!-- Bottom Controls Area -->
<div class="relative z-20 flex w-full flex-col items-center justify-end bg-gradient-to-t from-background-dark via-background-dark/90 to-transparent pb-10 pt-16">
<!-- Step Indicators -->
<div class="mb-8 flex flex-row items-center justify-center gap-3">
<div class="h-1.5 w-1.5 rounded-full bg-white/20"></div>
<div class="h-1.5 w-8 rounded-full bg-primary shadow-[0_0_10px_rgba(245,198,25,0.4)]"></div>
<div class="h-1.5 w-1.5 rounded-full bg-white/20"></div>
</div>
<!-- Capture Controls -->
<div class="flex w-full items-center justify-between px-10">
<!-- Gallery (Secondary Action) -->
<button class="flex size-12 items-center justify-center rounded-full bg-white/5 text-white/80 backdrop-blur-sm transition-transform active:scale-95">
<span class="material-symbols-outlined text-[24px]">photo_library</span>
</button>
<!-- Main Shutter Button -->
<button class="group relative flex size-20 items-center justify-center rounded-full border-4 border-white/20 bg-transparent transition-all active:scale-95">
<div class="absolute inset-1 rounded-full bg-primary shadow-[0_0_20px_rgba(245,198,25,0.3)] transition-all group-active:inset-2"></div>
<span class="material-symbols-outlined relative z-10 text-background-dark icon-fill text-[32px]">camera</span>
</button>
<!-- Help/Tip (Secondary Action) -->
<button class="flex size-12 items-center justify-center rounded-full bg-white/5 text-white/80 backdrop-blur-sm transition-transform active:scale-95">
<span class="material-symbols-outlined text-[24px]">help</span>
</button>
</div>
<p class="mt-6 text-xs font-medium text-white/40">Step 2 of 3</p>
</div>
</div>
<style>
        @keyframes scan {
            0% { top: 10%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 90%; opacity: 0; }
        }
    </style>
</body></html>
