<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Identity Selection - Midnight Gold</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#f5c619",
              "background-light": "#f8f8f5",
              "background-dark": "#221e10",
            },
            fontFamily: {
              "display": ["Manrope", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
            backgroundImage: {
                'gold-gradient': 'linear-gradient(135deg, #f5c619 0%, #d4a000 100%)',
                'glass-gradient': 'linear-gradient(145deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%)',
                'glass-selected': 'linear-gradient(145deg, rgba(245, 198, 25, 0.15) 0%, rgba(245, 198, 25, 0.03) 100%)',
            }
          },
        },
      }
    </script>
<style>
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(245, 198, 25, 0.2);
            border-radius: 10px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white min-h-screen flex flex-col relative overflow-hidden">
<!-- Decorative ambient glow -->
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[40%] bg-primary/10 blur-[100px] rounded-full pointer-events-none" data-alt="Abstract golden ambient glow"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[40%] bg-primary/5 blur-[120px] rounded-full pointer-events-none" data-alt="Abstract golden ambient glow"></div>
<!-- Top Navigation -->
<div class="relative z-10 w-full px-6 py-6 flex items-center justify-between">
<button class="flex items-center justify-center w-10 h-10 rounded-full bg-white/5 hover:bg-white/10 active:scale-95 transition-all text-white border border-white/5 backdrop-blur-sm">
<span class="material-symbols-outlined text-[20px]">arrow_back</span>
</button>
<!-- Progress Indicators -->
<div class="flex items-center gap-2">
<div class="h-1.5 w-6 rounded-full bg-primary shadow-[0_0_10px_rgba(245,198,25,0.5)]"></div>
<div class="h-1.5 w-1.5 rounded-full bg-white/20"></div>
<div class="h-1.5 w-1.5 rounded-full bg-white/20"></div>
</div>
<!-- Spacer for alignment -->
<div class="w-10"></div>
</div>
<!-- Main Content Area -->
<main class="relative z-10 flex-1 flex flex-col px-6 w-full max-w-md mx-auto pb-28">
<!-- Hero Text -->
<div class="mt-4 mb-8">
<h1 class="text-3xl font-bold text-white mb-3 tracking-wide drop-shadow-sm">
                Choose <span class="text-primary">Document Type</span>
</h1>
<p class="text-white/60 text-[15px] font-normal leading-relaxed">
                To ensure the safety of our exclusive community, please verify your identity using one of the following methods.
            </p>
</div>
<!-- Selection Cards Grid -->
<div class="flex flex-col gap-4">
<!-- Option 1: Passport (Selected State) -->
<label class="relative group cursor-pointer w-full">
<input checked="" class="peer sr-only" name="document_type" type="radio" value="passport"/>
<div class="flex items-center gap-5 p-5 w-full rounded-[24px] border transition-all duration-300 bg-glass-gradient border-white/10 backdrop-blur-xl peer-checked:bg-glass-selected peer-checked:border-primary peer-checked:shadow-[0_0_20px_rgba(245,198,25,0.15)]">
<!-- Icon Container -->
<div class="flex-shrink-0 w-14 h-14 rounded-full flex items-center justify-center bg-white/5 text-white/70 peer-checked:bg-primary peer-checked:text-background-dark peer-checked:shadow-lg transition-colors duration-300">
<span class="material-symbols-outlined text-[28px]">book_2</span>
</div>
<!-- Text -->
<div class="flex-1 text-left">
<h3 class="text-white text-lg font-bold leading-tight mb-1 group-hover:text-primary transition-colors">Passport</h3>
<p class="text-white/40 text-sm font-medium">Recommended for tourists</p>
</div>
<!-- Check Circle -->
<div class="w-6 h-6 rounded-full border-2 border-white/20 flex items-center justify-center transition-all duration-300 peer-checked:border-primary peer-checked:bg-primary">
<span class="material-symbols-outlined text-background-dark text-[14px] font-bold opacity-0 peer-checked:opacity-100">check</span>
</div>
</div>
</label>
<!-- Option 2: National ID -->
<label class="relative group cursor-pointer w-full">
<input class="peer sr-only" name="document_type" type="radio" value="national_id"/>
<div class="flex items-center gap-5 p-5 w-full rounded-[24px] border transition-all duration-300 bg-glass-gradient border-white/10 backdrop-blur-xl peer-checked:bg-glass-selected peer-checked:border-primary peer-checked:shadow-[0_0_20px_rgba(245,198,25,0.15)] hover:bg-white/10 hover:border-white/20">
<div class="flex-shrink-0 w-14 h-14 rounded-full flex items-center justify-center bg-white/5 text-white/70 peer-checked:bg-primary peer-checked:text-background-dark peer-checked:shadow-lg transition-colors duration-300">
<span class="material-symbols-outlined text-[28px]">badge</span>
</div>
<div class="flex-1 text-left">
<h3 class="text-white text-lg font-bold leading-tight mb-1 group-hover:text-primary transition-colors">National ID</h3>
<p class="text-white/40 text-sm font-medium">For Ethiopian residents</p>
</div>
<div class="w-6 h-6 rounded-full border-2 border-white/20 flex items-center justify-center transition-all duration-300 peer-checked:border-primary peer-checked:bg-primary">
<span class="material-symbols-outlined text-background-dark text-[14px] font-bold opacity-0 peer-checked:opacity-100">check</span>
</div>
</div>
</label>
<!-- Option 3: Driver License -->
<label class="relative group cursor-pointer w-full">
<input class="peer sr-only" name="document_type" type="radio" value="driver_license"/>
<div class="flex items-center gap-5 p-5 w-full rounded-[24px] border transition-all duration-300 bg-glass-gradient border-white/10 backdrop-blur-xl peer-checked:bg-glass-selected peer-checked:border-primary peer-checked:shadow-[0_0_20px_rgba(245,198,25,0.15)] hover:bg-white/10 hover:border-white/20">
<div class="flex-shrink-0 w-14 h-14 rounded-full flex items-center justify-center bg-white/5 text-white/70 peer-checked:bg-primary peer-checked:text-background-dark peer-checked:shadow-lg transition-colors duration-300">
<span class="material-symbols-outlined text-[28px]">directions_car</span>
</div>
<div class="flex-1 text-left">
<h3 class="text-white text-lg font-bold leading-tight mb-1 group-hover:text-primary transition-colors">Driver License</h3>
<p class="text-white/40 text-sm font-medium">International license</p>
</div>
<div class="w-6 h-6 rounded-full border-2 border-white/20 flex items-center justify-center transition-all duration-300 peer-checked:border-primary peer-checked:bg-primary">
<span class="material-symbols-outlined text-background-dark text-[14px] font-bold opacity-0 peer-checked:opacity-100">check</span>
</div>
</div>
</label>
</div>
</main>
<!-- Footer / CTA -->
<div class="fixed bottom-0 left-0 right-0 z-20 px-6 pb-8 pt-4 bg-gradient-to-t from-background-dark via-background-dark/90 to-transparent backdrop-blur-sm">
<div class="max-w-md mx-auto">
<button class="w-full h-16 rounded-full bg-primary text-background-dark font-bold text-lg shadow-[0_0_25px_rgba(245,198,25,0.35)] hover:shadow-[0_0_35px_rgba(245,198,25,0.5)] active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-3">
<span>Start Verification</span>
<span class="material-symbols-outlined text-[20px] font-bold">arrow_forward</span>
</button>
<div class="text-center mt-3">
<p class="text-white/20 text-xs flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-[12px]">lock</span>
                    Encrypted &amp; Secure Verification
                </p>
</div>
</div>
</div>
</body></html>
