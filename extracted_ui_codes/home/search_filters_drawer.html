<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Search Filters Drawer - Midnight Gold</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f5c619",
                        "background-light": "#f8f8f5",
                        "background-dark": "#121212",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .ios-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<!-- Background Content (Simulated Home Screen) -->
<div class="fixed inset-0 z-0 overflow-hidden">
<div class="relative w-full h-full p-6 space-y-6 opacity-40 grayscale-[0.5]">
<div class="flex items-center justify-between">
<div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center">
<span class="material-symbols-outlined text-white">menu</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary">location_on</span>
<span class="text-white font-bold">Addis Ababa</span>
</div>
<div class="w-10 h-10 rounded-full bg-white/10"></div>
</div>
<div class="space-y-4">
<div class="h-48 w-full rounded-lg bg-white/10"></div>
<div class="h-6 w-3/4 rounded bg-white/10"></div>
<div class="h-4 w-1/2 rounded bg-white/10"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="h-40 rounded-lg bg-white/10"></div>
<div class="h-40 rounded-lg bg-white/10"></div>
</div>
</div>
</div>
<!-- Dimmed Overlay -->
<div class="fixed inset-0 bg-black/70 z-10"></div>
<!-- Bottom Sheet Drawer -->
<div class="fixed inset-x-0 bottom-0 z-20 flex flex-col max-h-[92%] bg-background-light dark:bg-background-dark rounded-t-xl shadow-2xl border-t border-white/5">
<!-- BottomSheetHandle -->
<button class="flex h-8 w-full items-center justify-center shrink-0">
<div class="h-1.5 w-12 rounded-full bg-[#3d3a30]"></div>
</button>
<!-- TopAppBar -->
<div class="flex items-center px-6 py-2 justify-between">
<h2 class="text-black dark:text-white text-xl font-bold leading-tight tracking-tight flex-1">Filter Results</h2>
<button class="flex items-center justify-end">
<p class="text-primary text-base font-bold leading-normal tracking-wide">Reset</p>
</button>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto px-6 py-4 space-y-8 pb-32">
<!-- Price Range Section -->
<div class="space-y-4">
<h3 class="text-black dark:text-white text-lg font-bold leading-tight tracking-tight">Price Range</h3>
<div class="bg-white/5 p-6 rounded-lg border border-white/5">
<div class="@container">
<div class="relative flex w-full flex-col items-start justify-between gap-6">
<div class="flex justify-between w-full">
<p class="text-white/60 text-sm font-medium uppercase tracking-widest">Per Night (USD)</p>
<p class="text-primary text-lg font-bold">$120 — $850+</p>
</div>
<div class="flex h-[38px] w-full pt-1.5 px-2">
<div class="flex h-1.5 w-full rounded-full bg-[#3d3a30] relative items-center">
<div class="absolute left-[20%] right-[30%] h-1.5 rounded-full bg-primary shadow-[0_0_15px_rgba(245,198,25,0.4)]"></div>
<div class="absolute left-[20%] -translate-x-1/2">
<div class="size-6 rounded-full bg-white border-2 border-primary shadow-lg cursor-pointer"></div>
</div>
<div class="absolute right-[30%] translate-x-1/2">
<div class="size-6 rounded-full bg-white border-2 border-primary shadow-lg cursor-pointer"></div>
</div>
</div>
</div>
</div>
</div>
</div>
</div>
<!-- Categories Section -->
<div class="space-y-4">
<h3 class="text-black dark:text-white text-lg font-bold leading-tight tracking-tight">Categories</h3>
<div class="flex flex-wrap gap-2">
<div class="px-5 py-2.5 rounded-full bg-primary text-black font-bold text-sm shadow-md flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">hotel</span> Boutique Hotels
                    </div>
<div class="px-5 py-2.5 rounded-full bg-white/5 border border-white/10 text-white font-medium text-sm flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">restaurant</span> Fine Dining
                    </div>
<div class="px-5 py-2.5 rounded-full bg-white/5 border border-white/10 text-white font-medium text-sm flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">explore</span> Private Tours
                    </div>
<div class="px-5 py-2.5 rounded-full bg-white/5 border border-white/10 text-white font-medium text-sm flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">spa</span> Wellness &amp; Spa
                    </div>
<div class="px-5 py-2.5 rounded-full bg-white/5 border border-white/10 text-white font-medium text-sm flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">theater_comedy</span> Cultural Events
                    </div>
</div>
</div>
<!-- Ratings Section -->
<div class="space-y-4">
<h3 class="text-black dark:text-white text-lg font-bold leading-tight tracking-tight">Minimum Rating</h3>
<div class="flex items-center justify-between bg-white/5 p-4 rounded-lg border border-white/5">
<div class="flex gap-2">
<span class="material-symbols-outlined text-primary fill-1">star</span>
<span class="material-symbols-outlined text-primary fill-1">star</span>
<span class="material-symbols-outlined text-primary fill-1">star</span>
<span class="material-symbols-outlined text-primary fill-1">star</span>
<span class="material-symbols-outlined text-white/20">star</span>
</div>
<span class="text-white font-bold text-lg">4.0+</span>
</div>
</div>
<!-- Location Features -->
<div class="space-y-4">
<h3 class="text-black dark:text-white text-lg font-bold leading-tight tracking-tight">Amenities</h3>
<div class="grid grid-cols-2 gap-3">
<button class="flex items-center gap-3 p-4 rounded-lg bg-white/5 border border-white/10 text-white">
<span class="material-symbols-outlined text-primary">wifi</span>
<span class="text-sm font-medium">Fast WiFi</span>
</button>
<button class="flex items-center gap-3 p-4 rounded-lg bg-white/10 border border-primary/50 text-white shadow-[0_0_10px_rgba(245,198,25,0.1)]">
<span class="material-symbols-outlined text-primary">pool</span>
<span class="text-sm font-medium">Pool Access</span>
</button>
<button class="flex items-center gap-3 p-4 rounded-lg bg-white/5 border border-white/10 text-white">
<span class="material-symbols-outlined text-primary">local_parking</span>
<span class="text-sm font-medium">Valet Parking</span>
</button>
<button class="flex items-center gap-3 p-4 rounded-lg bg-white/5 border border-white/10 text-white">
<span class="material-symbols-outlined text-primary">fitness_center</span>
<span class="text-sm font-medium">Gym</span>
</button>
</div>
</div>
</div>
<!-- Footer Action Button -->
<div class="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-background-dark via-background-dark to-transparent pt-12">
<button class="w-full bg-primary hover:bg-primary/90 text-black font-extrabold py-4 rounded-full text-lg shadow-xl shadow-primary/20 transition-all flex items-center justify-center gap-2">
                Show 124 Results
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
<!-- Extra Bottom Padding for iOS Home Indicator -->
<div class="fixed bottom-0 w-full h-8 bg-background-dark pointer-events-none z-30"></div>
</body></html>
