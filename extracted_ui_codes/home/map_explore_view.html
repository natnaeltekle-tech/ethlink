<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Map Explore View</title>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#f5c619",
              "background-light": "#f8f8f5",
              "background-dark": "#221e10",
              "midnight-map": "#1e293b", // Custom slate tone for map
            },
            fontFamily: {
              "display": ["Spline Sans", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased overflow-hidden h-screen w-full flex flex-col">
<!-- Map Background Layer -->
<!-- Simulating a dark styled map using a base color and a textured image overlay -->
<div class="absolute inset-0 z-0 bg-midnight-map">
<div class="w-full h-full bg-cover bg-center opacity-30 mix-blend-overlay grayscale contrast-125" data-alt="Dark abstract map texture of Addis Ababa streets" data-location="Addis Ababa" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuA11Ugpg4DTzLGFkTbi0rCvZeL4QDMLgXGLNPnWnObuS_ptgoypKJbZy_KMlWLaJrfxe34c5-IIY8bXGiRbcxzSP5LZS6Y2qSFzDkVX4ftnUHWXp0kdOsv3DiOBOpLfXVFOea6l6d3WF_egDotrkWm2dgMWkPsw3FRG_uQeK8ukU1Me1StktZlvfwwnHPyQ-7cqv5BsRlDZvdiAEFzN1SYRcMcFiASc5KAHndNM0rZOmzihgDsxtc3qfCMvGM5-yiAcE2bnkoL_TwY');"></div>
<!-- Map Markers -->
<!-- Inactive Pin 1 -->
<div class="absolute top-[30%] left-[20%] flex flex-col items-center transform hover:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined text-primary text-3xl opacity-80 drop-shadow-lg filled">location_on</span>
</div>
<!-- Inactive Pin 2 -->
<div class="absolute top-[45%] right-[15%] flex flex-col items-center transform hover:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined text-primary text-3xl opacity-80 drop-shadow-lg filled">location_on</span>
</div>
<!-- Inactive Pin 3 -->
<div class="absolute top-[25%] right-[35%] flex flex-col items-center transform hover:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined text-primary text-3xl opacity-80 drop-shadow-lg filled">location_on</span>
</div>
<!-- Active Pin (Centerish) - Represents the selected hotel -->
<div class="absolute top-[40%] left-[50%] -translate-x-1/2 -translate-y-1/2 flex flex-col items-center z-10 group cursor-pointer">
<!-- Pulse Effect -->
<div class="absolute inset-0 bg-primary/40 rounded-full animate-ping opacity-75"></div>
<div class="relative bg-background-dark p-2.5 rounded-full border-2 border-primary shadow-[0_0_30px_rgba(245,198,25,0.5)]">
<span class="material-symbols-outlined text-primary text-4xl filled">location_on</span>
</div>
<!-- Floating Label for Active Pin -->
<div class="mt-3 px-4 py-1.5 bg-background-dark/90 backdrop-blur-md rounded-full border border-white/10 shadow-xl transform translate-y-1 transition-transform">
<span class="text-white text-xs font-semibold tracking-wide whitespace-nowrap">Sheraton Addis</span>
</div>
</div>
</div>
<!-- Main UI Overlay Layer -->
<!-- pointer-events-none allows interaction with the map beneath in empty spaces -->
<div class="relative z-10 flex flex-col h-full pointer-events-none">
<!-- Header Section -->
<div class="w-full px-5 pt-14 pb-4 pointer-events-auto bg-gradient-to-b from-black/60 to-transparent">
<!-- Search Bar -->
<div class="flex items-center gap-3 w-full">
<div class="flex-1 h-14 bg-background-dark/40 backdrop-blur-xl border border-white/10 rounded-full flex items-center px-4 shadow-2xl transition-all focus-within:bg-background-dark/70 focus-within:border-primary/50">
<span class="material-symbols-outlined text-white/60 text-2xl">search</span>
<input class="bg-transparent border-none text-white placeholder-white/60 focus:ring-0 w-full ml-2 text-base font-normal h-full outline-none" placeholder="Search luxury stays, dining..." type="text"/>
</div>
<!-- Filter Button -->
<button class="h-14 w-14 shrink-0 rounded-full bg-background-dark/40 backdrop-blur-xl border border-white/10 flex items-center justify-center shadow-2xl active:bg-primary active:text-background-dark transition-colors group">
<span class="material-symbols-outlined text-primary group-active:text-background-dark">tune</span>
</button>
</div>
<!-- Quick Filter Chips -->
<div class="flex gap-3 mt-4 overflow-x-auto no-scrollbar pb-2 mask-linear-fade">
<button class="px-5 py-2.5 rounded-full bg-primary text-background-dark text-sm font-bold shadow-lg shadow-primary/20 hover:bg-primary/90 transition-colors">All</button>
<button class="px-5 py-2.5 rounded-full bg-background-dark/40 backdrop-blur-md text-white border border-white/10 text-sm font-medium whitespace-nowrap hover:bg-white/10 transition-colors">Hotels</button>
<button class="px-5 py-2.5 rounded-full bg-background-dark/40 backdrop-blur-md text-white border border-white/10 text-sm font-medium whitespace-nowrap hover:bg-white/10 transition-colors">Dining</button>
<button class="px-5 py-2.5 rounded-full bg-background-dark/40 backdrop-blur-md text-white border border-white/10 text-sm font-medium whitespace-nowrap hover:bg-white/10 transition-colors">Experiences</button>
</div>
</div>
<!-- Spacer -->
<div class="flex-1 flex flex-col justify-end pb-2">
<!-- Floating Action Buttons -->
<div class="flex justify-end px-5 mb-4 pointer-events-auto gap-3">
<!-- List View Toggle (Optional as per brief) -->
<button class="h-12 px-4 rounded-full bg-background-dark/90 text-white shadow-xl flex items-center justify-center border border-white/10 active:scale-95 transition-transform gap-2 backdrop-blur-md">
<span class="material-symbols-outlined text-sm">format_list_bulleted</span>
<span class="text-xs font-bold uppercase tracking-wider">List</span>
</button>
<!-- My Location -->
<button class="h-12 w-12 rounded-full bg-background-dark/90 text-primary shadow-xl flex items-center justify-center border border-white/10 active:scale-95 transition-transform backdrop-blur-md">
<span class="material-symbols-outlined">my_location</span>
</button>
</div>
<!-- Carousel Section -->
<div class="pointer-events-auto w-full">
<div class="flex overflow-x-auto no-scrollbar px-5 pb-6 gap-4 snap-x snap-mandatory scroll-smooth">
<!-- Card 1 (Active/Selected) -->
<div class="snap-center shrink-0 w-[88%] max-w-[340px] bg-[#1a160d]/90 backdrop-blur-xl rounded-[2rem] p-3.5 border border-primary/40 shadow-2xl relative overflow-hidden group">
<!-- Decorative Glow -->
<div class="absolute top-0 right-0 w-40 h-40 bg-primary/10 rounded-full blur-3xl -mr-16 -mt-16 pointer-events-none"></div>
<div class="flex gap-4 items-center">
<div class="w-24 h-24 rounded-2xl bg-gray-800 bg-cover bg-center shrink-0 shadow-inner" data-alt="Night view of Sheraton Addis luxury hotel exterior with lights" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuARPBDg-eWzG6MXoOu4rNZPj6cGGBgmU7EpymTZMD40Qu6iSNX7qm86QQMpK5ev-UsApg68v2wOAndTkwYMKfZ0Ad4OFyDZKJRYUkrp-p7ADqiu0G_vt1RyzLhyT06knvlA6GNjO2-IVk7dhcXFGN4tT9vC7RsZLII5qkUx1G8KKABNMg9yv7h1yyAsSp4ACph-_pnov1djdH9Nls8_Vr6TC998n--pjcTGcJnGD3a_FQ_mW8EhGDi6hhOo0bMMGcgdqtkiyecKTlE');"></div>
<div class="flex flex-col justify-center flex-1 min-w-0 py-0.5">
<div class="flex justify-between items-start mb-1">
<h3 class="text-white font-bold text-lg leading-tight truncate pr-2">Sheraton Addis</h3>
</div>
<div class="flex items-center gap-2 mb-2">
<div class="flex items-center gap-1 bg-white/5 px-1.5 py-0.5 rounded-md border border-white/5">
<span class="material-symbols-outlined text-primary text-[14px] filled">star</span>
<span class="text-white text-xs font-bold">4.9</span>
</div>
<span class="text-white/40 text-xs truncate">1.2km away</span>
</div>
<div class="flex items-baseline gap-1">
<p class="text-primary font-bold text-xl">$450</p>
<span class="text-xs text-white/50 font-normal">/ night</span>
</div>
</div>
</div>
</div>
<!-- Card 2 -->
<div class="snap-center shrink-0 w-[88%] max-w-[340px] bg-background-dark/80 backdrop-blur-md rounded-[2rem] p-3.5 border border-white/5 shadow-xl transition-transform hover:scale-[1.02]">
<div class="flex gap-4 items-center">
<div class="w-24 h-24 rounded-2xl bg-gray-800 bg-cover bg-center shrink-0 shadow-inner" data-alt="Lush green scenery at Entoto Park Resort" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBDBgliHc9oWL3nSYQD9bQ7I9_H2j7tC0b89i9UejHkuBwCghe4MOuy9XPP-yE82VSy-QQ-CEVcinrADxvqLx0ocyT4lSgkuYJlOOi8ASY8c-aPrphEs3fGTV7RCwG2PRCl84QS69LGL5h9vY5g65sr3_xH1TO8UA1uSkQ-PtBtuLm5HLh56Kd2Q_PftKeKLXEP41yBn94d_SACud5U1fEbvCKt8E7HzyfkRJxpd2DXg8zz-HQU5PUZg3qfLEy2leNkXNib0ERyLtw');"></div>
<div class="flex flex-col justify-center flex-1 min-w-0 py-0.5">
<div class="flex justify-between items-start mb-1">
<h3 class="text-white font-bold text-lg leading-tight truncate pr-2">Entoto Resort</h3>
</div>
<div class="flex items-center gap-2 mb-2">
<div class="flex items-center gap-1 bg-white/5 px-1.5 py-0.5 rounded-md border border-white/5">
<span class="material-symbols-outlined text-primary text-[14px] filled">star</span>
<span class="text-white text-xs font-bold">4.7</span>
</div>
<span class="text-white/40 text-xs truncate">5.0km away</span>
</div>
<div class="flex items-baseline gap-1">
<p class="text-primary font-bold text-xl">$300</p>
<span class="text-xs text-white/50 font-normal">/ night</span>
</div>
</div>
</div>
</div>
<!-- Card 3 -->
<div class="snap-center shrink-0 w-[88%] max-w-[340px] bg-background-dark/80 backdrop-blur-md rounded-[2rem] p-3.5 border border-white/5 shadow-xl transition-transform hover:scale-[1.02]">
<div class="flex gap-4 items-center">
<div class="w-24 h-24 rounded-2xl bg-gray-800 bg-cover bg-center shrink-0 shadow-inner" data-alt="Exclusive entrance to Unity Park VIP area" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAL2CSFDvcz_ltgoOI9-lZnTLSGKhoaclQKJZEQgdNeaGpGA0X39rdJi4A9y-7uM9POUtCXf7U8mUVY3ME92_bTIMCM-tey0WPHmjJNZUk0vwGo_Q9_D-sBgwePfETmWXu_pFszRtlrlGuyYgMLndD95PSUglUPgy6WEMJU55I48qs-3QOf7WACxFa6oOmzzSJ6ZqhezbfhxoVJ8XaekEh8I9G7UH1tSHL8w4YPdWJUP-m4aYvZhzBHjGy-rPPaMXG7uGVBdKfZDGo');"></div>
<div class="flex flex-col justify-center flex-1 min-w-0 py-0.5">
<div class="flex justify-between items-start mb-1">
<h3 class="text-white font-bold text-lg leading-tight truncate pr-2">Unity Park VIP</h3>
</div>
<div class="flex items-center gap-2 mb-2">
<div class="flex items-center gap-1 bg-white/5 px-1.5 py-0.5 rounded-md border border-white/5">
<span class="material-symbols-outlined text-primary text-[14px] filled">star</span>
<span class="text-white text-xs font-bold">4.8</span>
</div>
<span class="text-white/40 text-xs truncate">2.5km away</span>
</div>
<div class="flex items-baseline gap-1">
<p class="text-primary font-bold text-xl">$120</p>
<span class="text-xs text-white/50 font-normal">/ person</span>
</div>
</div>
</div>
</div>
</div>
</div>
</div>
</div>
<!-- Bottom Navigation (Fixed) -->
<div class="bg-background-dark border-t border-white/5 px-6 pt-3 pb-8 z-20 shadow-[0_-5px_20px_rgba(0,0,0,0.5)]">
<div class="flex justify-between items-center max-w-md mx-auto">
<button class="flex flex-col items-center gap-1.5 text-primary group">
<div class="relative">
<span class="material-symbols-outlined filled text-[26px] group-hover:scale-110 transition-transform">explore</span>
<div class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-1 h-1 bg-primary rounded-full"></div>
</div>
<span class="text-[10px] font-semibold tracking-wider uppercase">Explore</span>
</button>
<button class="flex flex-col items-center gap-1.5 text-white/40 hover:text-white transition-colors group">
<span class="material-symbols-outlined text-[26px] group-hover:scale-110 transition-transform">favorite</span>
<span class="text-[10px] font-semibold tracking-wider uppercase">Saved</span>
</button>
<button class="flex flex-col items-center gap-1.5 text-white/40 hover:text-white transition-colors group">
<span class="material-symbols-outlined text-[26px] group-hover:scale-110 transition-transform">airplane_ticket</span>
<span class="text-[10px] font-semibold tracking-wider uppercase">Trips</span>
</button>
<button class="flex flex-col items-center gap-1.5 text-white/40 hover:text-white transition-colors group">
<span class="material-symbols-outlined text-[26px] group-hover:scale-110 transition-transform">account_circle</span>
<span class="text-[10px] font-semibold tracking-wider uppercase">Profile</span>
</button>
</div>
</div>
</body></html>
