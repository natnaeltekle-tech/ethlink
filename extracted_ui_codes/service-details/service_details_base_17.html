<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Listing Step 2</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f5c619", // Gold
                        "background-light": "#f8f8f5",
                        "background-dark": "#181611", // Deep rich dark background
                        "surface-dark": "#221e10", // Slightly lighter for cards/inputs
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "1.5rem", "xl": "2rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom Scrollbar for hidden aesthetics */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
        
        /* Map dark mode filter overlay simulation */
        .map-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, rgba(24, 22, 17, 0.1), rgba(24, 22, 17, 0.3));
            pointer-events: none;
            border-radius: inherit;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-slate-900 dark:text-white">
<div class="relative flex h-full min-h-screen w-full flex-col overflow-x-hidden max-w-md mx-auto shadow-2xl bg-background-light dark:bg-background-dark">
<!-- Header -->
<header class="sticky top-0 z-20 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-md border-b border-black/5 dark:border-white/5 p-4 pb-2">
<div class="flex items-center justify-between">
<button class="text-slate-900 dark:text-white flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-10">Listing Details</h2>
</div>
<!-- Progress Indicator -->
<div class="flex w-full flex-row items-center justify-center gap-2 py-4">
<div class="h-1.5 w-8 rounded-full bg-slate-200 dark:bg-surface-dark"></div>
<div class="h-1.5 w-8 rounded-full bg-primary shadow-[0_0_10px_rgba(245,198,25,0.4)]"></div>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 flex flex-col px-5 pb-32 pt-2 gap-8">
<!-- Headline -->
<div>
<h3 class="text-slate-900 dark:text-white tracking-tight text-2xl font-bold leading-tight">Define your property's unique features.</h3>
<p class="text-slate-500 dark:text-gray-400 text-sm mt-2">Make your listing stand out to premium travelers.</p>
</div>
<!-- Location Section -->
<section>
<div class="flex items-center justify-between mb-3">
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em]">Pin Location</h2>
<button class="text-primary text-sm font-semibold hover:text-primary/80 transition-colors">Edit</button>
</div>
<div class="relative w-full rounded-xl overflow-hidden shadow-lg border border-slate-200 dark:border-white/5 group map-container">
<div class="w-full bg-center bg-no-repeat aspect-[16/9] bg-cover object-cover" data-alt="Dark themed map of Addis Ababa with street layout" data-location="Addis Ababa, Ethiopia" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuA6nFenHjfnfato0E1Nd3Hts_0Ura8jCWEHSH9bwdkm4-CDYqaEimhMo3Iz0i9nkKLy81ECEgRCc10-hL5tLai31Fse_hcB-C8uJsb3Uqxlql6967wCqK8780Zigh8w2-uAR6kAEwdAb3etIj0K6okoSvE0V-mxj-r2kxWIyMO1JxIUEExkgqArAfOI_yUp_jY7yLlu-W0pQ4_4Uxee4qJcqN_9cikdn8fxKFxOyG1sznFGLvFB7vN-eJ2iEtYhrZSivVsgX003D0E"); background-color: #242f3e;'>
<!-- Fallback background color if image fails -->
</div>
<!-- Custom Pin -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 transform">
<div class="relative">
<span class="material-symbols-outlined text-primary text-4xl drop-shadow-md">location_on</span>
<div class="absolute top-full left-1/2 -translate-x-1/2 w-3 h-1.5 bg-black/40 blur-[2px] rounded-full"></div>
</div>
</div>
<!-- Location Label Overlay -->
<div class="absolute bottom-3 left-3 bg-background-light/90 dark:bg-surface-dark/90 backdrop-blur-sm px-3 py-1.5 rounded-lg border border-black/5 dark:border-white/5">
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-primary text-sm">my_location</span>
<span class="text-xs font-medium text-slate-800 dark:text-white">Bole, Addis Ababa</span>
</div>
</div>
</div>
</section>
<!-- Amenities Section -->
<section>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] mb-4">What does this place offer?</h2>
<div class="grid grid-cols-4 gap-4">
<!-- Active Item -->
<button class="flex flex-col items-center gap-2 group">
<div class="size-14 rounded-full bg-primary text-background-dark flex items-center justify-center shadow-[0_0_15px_rgba(245,198,25,0.3)] transition-transform active:scale-95 border-2 border-primary">
<span class="material-symbols-outlined">wifi</span>
</div>
<span class="text-xs font-medium text-slate-900 dark:text-white">Wi-Fi</span>
</button>
<!-- Active Item -->
<button class="flex flex-col items-center gap-2 group">
<div class="size-14 rounded-full bg-primary text-background-dark flex items-center justify-center shadow-[0_0_15px_rgba(245,198,25,0.3)] transition-transform active:scale-95 border-2 border-primary">
<span class="material-symbols-outlined">pool</span>
</div>
<span class="text-xs font-medium text-slate-900 dark:text-white">Pool</span>
</button>
<!-- Inactive Item -->
<button class="flex flex-col items-center gap-2 group">
<div class="size-14 rounded-full bg-slate-100 dark:bg-surface-dark text-slate-400 dark:text-gray-500 flex items-center justify-center border border-slate-200 dark:border-white/10 transition-all active:scale-95 group-hover:border-primary/50 group-hover:text-primary">
<span class="material-symbols-outlined">local_parking</span>
</div>
<span class="text-xs font-medium text-slate-500 dark:text-gray-400 group-hover:text-primary transition-colors">Parking</span>
</button>
<!-- Inactive Item -->
<button class="flex flex-col items-center gap-2 group">
<div class="size-14 rounded-full bg-slate-100 dark:bg-surface-dark text-slate-400 dark:text-gray-500 flex items-center justify-center border border-slate-200 dark:border-white/10 transition-all active:scale-95 group-hover:border-primary/50 group-hover:text-primary">
<span class="material-symbols-outlined">fitness_center</span>
</div>
<span class="text-xs font-medium text-slate-500 dark:text-gray-400 group-hover:text-primary transition-colors">Gym</span>
</button>
<!-- Inactive Item -->
<button class="flex flex-col items-center gap-2 group">
<div class="size-14 rounded-full bg-slate-100 dark:bg-surface-dark text-slate-400 dark:text-gray-500 flex items-center justify-center border border-slate-200 dark:border-white/10 transition-all active:scale-95 group-hover:border-primary/50 group-hover:text-primary">
<span class="material-symbols-outlined">ac_unit</span>
</div>
<span class="text-xs font-medium text-slate-500 dark:text-gray-400 group-hover:text-primary transition-colors">AC</span>
</button>
<!-- Inactive Item -->
<button class="flex flex-col items-center gap-2 group">
<div class="size-14 rounded-full bg-slate-100 dark:bg-surface-dark text-slate-400 dark:text-gray-500 flex items-center justify-center border border-slate-200 dark:border-white/10 transition-all active:scale-95 group-hover:border-primary/50 group-hover:text-primary">
<span class="material-symbols-outlined">security</span>
</div>
<span class="text-xs font-medium text-slate-500 dark:text-gray-400 group-hover:text-primary transition-colors">Security</span>
</button>
<!-- Inactive Item -->
<button class="flex flex-col items-center gap-2 group">
<div class="size-14 rounded-full bg-slate-100 dark:bg-surface-dark text-slate-400 dark:text-gray-500 flex items-center justify-center border border-slate-200 dark:border-white/10 transition-all active:scale-95 group-hover:border-primary/50 group-hover:text-primary">
<span class="material-symbols-outlined">concierge</span>
</div>
<span class="text-xs font-medium text-slate-500 dark:text-gray-400 group-hover:text-primary transition-colors">Concierge</span>
</button>
<!-- Add More Item -->
<button class="flex flex-col items-center gap-2 group">
<div class="size-14 rounded-full bg-transparent border-2 border-dashed border-slate-300 dark:border-white/20 text-slate-400 dark:text-gray-500 flex items-center justify-center transition-all active:scale-95 group-hover:border-primary/50 group-hover:text-primary">
<span class="material-symbols-outlined">add</span>
</div>
<span class="text-xs font-medium text-slate-500 dark:text-gray-400 group-hover:text-primary transition-colors">More</span>
</button>
</div>
</section>
<!-- Description Section -->
<section>
<div class="flex items-center justify-between mb-3">
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em]">About this place</h2>
<span class="text-xs text-slate-500 dark:text-gray-500 font-medium">124/1000</span>
</div>
<div class="relative group">
<textarea class="w-full h-40 bg-slate-100 dark:bg-surface-dark text-slate-900 dark:text-white rounded-xl p-4 text-base placeholder-slate-400 dark:placeholder-gray-500 border-none ring-1 ring-transparent focus:ring-primary outline-none resize-none shadow-inner transition-shadow" placeholder="Describe the luxury experience guests can expect...">Experience unparalleled luxury in the heart of Addis Ababa. This suite features panoramic city views, bespoke furniture, and...</textarea>
<!-- Decorative corner accent for focus state -->
<div class="absolute -bottom-px -right-px w-4 h-4 border-b-2 border-r-2 border-primary rounded-br-lg opacity-0 group-focus-within:opacity-100 transition-opacity"></div>
<div class="absolute -top-px -left-px w-4 h-4 border-t-2 border-l-2 border-primary rounded-tl-lg opacity-0 group-focus-within:opacity-100 transition-opacity"></div>
</div>
</section>
</main>
<!-- Footer Actions -->
<footer class="fixed bottom-0 left-0 right-0 p-5 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-xl border-t border-black/5 dark:border-white/5 flex items-center gap-4 z-50 max-w-md mx-auto">
<button class="h-14 px-6 rounded-full border border-slate-300 dark:border-white/20 text-slate-900 dark:text-white font-bold text-base bg-transparent hover:bg-black/5 dark:hover:bg-white/5 active:scale-95 transition-all">
                Back
            </button>
<button class="h-14 flex-1 rounded-full bg-primary text-background-dark font-bold text-base shadow-[0_0_20px_rgba(245,198,25,0.4)] hover:shadow-[0_0_25px_rgba(245,198,25,0.6)] hover:bg-[#fbd34d] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                Publish Listing
                <span class="material-symbols-outlined text-lg">check_circle</span>
</button>
</footer>
</div>
</body></html>
