<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Service Review Submission</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f5c619",
                        "background-light": "#0B0C15", // Force dark theme background as primary
                        "background-dark": "#0B0C15",
                        "surface-dark": "#151621",
                        "glass": "rgba(255, 255, 255, 0.03)",
                        "glass-border": "rgba(245, 198, 25, 0.2)",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.375rem", // rounded-md
                        "md": "0.375rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white min-h-screen overflow-x-hidden selection:bg-primary/30">
<!-- Main Container -->
<div class="relative flex flex-col w-full max-w-md mx-auto min-h-screen">
<!-- Header -->
<header class="sticky top-0 z-50 flex items-center justify-between p-4 bg-background-dark/95 backdrop-blur-md border-b border-white/5">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-white" style="font-size: 24px;">arrow_back_ios_new</span>
</button>
<h1 class="text-lg font-bold tracking-tight text-white flex-1 text-center pr-10">Rate Experience</h1>
</header>
<!-- Scrollable Content -->
<main class="flex-1 flex flex-col px-5 pb-32 pt-6 gap-8">
<!-- Service Summary Card -->
<div class="relative group overflow-hidden rounded-xl border border-glass-border bg-glass p-3 shadow-lg backdrop-blur-sm">
<div class="flex items-center gap-4">
<div class="w-20 h-20 shrink-0 rounded-lg bg-cover bg-center border border-white/10 relative overflow-hidden" data-alt="Luxurious hotel lobby with gold accents" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDV0T_wng_E0AKaYlkYrDIYBSVSjDhLOoVMneXeMtwdxU_IQT26afOQZr8_rGLJV43aKODceaSMMRPERMk2hQzcnophlg_SyVXcowEMAOw06mfEoBuk7zHxBSOIsYPfjIGjZR4hpfoZhzlinqLWR-JsVwJr-0pFEJyGXfjjIpbmWc49P6kA4LHP8P6buJLwNFcW1uy0kvCpdE9rCeWijqK91j4jwzKHUF_yivZ2LBqNEB5G3EKWAQiyCz_WMS_G-pxku6lm2vYCeD4");'>
<div class="absolute inset-0 bg-black/10"></div>
</div>
<div class="flex flex-col gap-1.5 flex-1 min-w-0">
<h3 class="text-white text-lg font-bold leading-tight truncate">Addis Ababa Hilton</h3>
<div class="flex items-center gap-1 text-gray-400">
<span class="material-symbols-outlined text-[16px] text-primary">location_on</span>
<p class="text-sm font-medium truncate">Menelik II Ave, Addis Ababa</p>
</div>
</div>
</div>
</div>
<!-- Rating Section -->
<div class="flex flex-col items-center gap-4">
<h2 class="text-2xl font-bold text-center text-white">How was your experience?</h2>
<div class="flex items-center gap-3">
<button class="group transition-transform active:scale-90 focus:outline-none">
<span class="material-symbols-outlined text-primary text-[40px] fill-1 transition-all drop-shadow-[0_0_8px_rgba(245,198,25,0.4)]">star</span>
</button>
<button class="group transition-transform active:scale-90 focus:outline-none">
<span class="material-symbols-outlined text-primary text-[40px] fill-1 transition-all drop-shadow-[0_0_8px_rgba(245,198,25,0.4)]">star</span>
</button>
<button class="group transition-transform active:scale-90 focus:outline-none">
<span class="material-symbols-outlined text-primary text-[40px] fill-1 transition-all drop-shadow-[0_0_8px_rgba(245,198,25,0.4)]">star</span>
</button>
<button class="group transition-transform active:scale-90 focus:outline-none">
<span class="material-symbols-outlined text-primary text-[40px] fill-1 transition-all drop-shadow-[0_0_8px_rgba(245,198,25,0.4)]">star</span>
</button>
<button class="group transition-transform active:scale-90 focus:outline-none">
<span class="material-symbols-outlined text-gray-600 text-[40px] transition-all hover:text-primary/50">star</span>
</button>
</div>
<span class="text-primary font-medium text-sm tracking-wide uppercase">Excellent</span>
</div>
<!-- Review Input Area -->
<div class="flex flex-col gap-3">
<label class="text-white text-base font-semibold pl-1" for="review">Write your review</label>
<div class="relative">
<textarea class="w-full h-40 bg-glass border border-white/10 rounded-xl p-4 text-base text-white placeholder-gray-500 focus:outline-none focus:border-primary/60 focus:ring-1 focus:ring-primary/60 transition-all resize-none shadow-inner" id="review" placeholder="Share details of your own experience at this place. What did you like the most?"></textarea>
<div class="absolute bottom-3 right-3 pointer-events-none">
<span class="material-symbols-outlined text-primary/30 text-[20px]">edit_note</span>
</div>
</div>
</div>
<!-- Photo Upload Section -->
<div class="flex flex-col gap-3">
<label class="text-white text-base font-semibold pl-1">Add Photos</label>
<div class="flex gap-3 overflow-x-auto pb-2 scrollbar-hide">
<!-- Upload Button -->
<button class="flex flex-col items-center justify-center w-24 h-24 shrink-0 rounded-xl border border-dashed border-primary/40 bg-primary/5 hover:bg-primary/10 transition-colors gap-2 group">
<span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform">add_a_photo</span>
<span class="text-[10px] font-bold text-primary uppercase tracking-wide">Upload</span>
</button>
<!-- Preview Image 1 -->
<div class="relative w-24 h-24 shrink-0 rounded-xl overflow-hidden group border border-white/10">
<img class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity" data-alt="Close up of a fancy cocktail drink" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDP2Y9QB3Aofc5hu6kmjb5k7IBlON-m-VBUf5z-hm2ZF8SpsY7PCYufk2NIXcDQg9I-x-JM6eoQTZuVoAAKQfhi6Ro4PgdesjCJt-m_kpFCOolWrYVc2pQ0qFsZhioiLPlz6KfSVrvxPN0JwiL7ta9b0it9LEggfhqC34woyJo8oDMUr11HlUO-B6Y4l7rd6ECrqu6X1KSwO4x59U7wkWvJevVeksZsvQnSwpBB9qEaTI_FvrUgnM7lqmwPRheVAybFAQUxc763y80"/>
<button class="absolute top-1 right-1 bg-black/60 rounded-full p-0.5 text-white opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-[16px]">close</span>
</button>
</div>
<!-- Preview Image 2 -->
<div class="relative w-24 h-24 shrink-0 rounded-xl overflow-hidden group border border-white/10">
<img class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity" data-alt="Interior view of a luxury restaurant with moody lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCifLRg4b8IHSGgPbvXwjJSVdqSifRt-DFFjKlKdAmLsQS6RhmFgv8Lwc66H3W8kj7rqir_FSMdx9BMR8zisHM1FMWZ2852nguOLS_LIrVvZ-rz2HJ68_wcf4wg2YHwYBbEPUySPhHMATihQKluYMdWyYJQeoshH3NxRbjhRo4BlEPAfpVwHqSVKQfmNfEAYQltPTHXoZE7Gd4PmtFlg7HaN2A9BqUQv4jg4d6FQbMu5gbiIk8pIoksX8GAEAdLAYiT7D5uadEb1Ec"/>
<button class="absolute top-1 right-1 bg-black/60 rounded-full p-0.5 text-white opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-[16px]">close</span>
</button>
</div>
</div>
</div>
</main>
<!-- Sticky Bottom Button -->
<div class="fixed bottom-0 left-0 w-full p-5 bg-gradient-to-t from-background-dark via-background-dark/95 to-transparent backdrop-blur-[2px] z-40 max-w-md mx-auto right-0">
<button class="w-full bg-primary text-background-dark text-lg font-bold py-4 rounded-xl shadow-[0_0_20px_rgba(245,198,25,0.3)] hover:shadow-[0_0_30px_rgba(245,198,25,0.5)] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span>Submit Review</span>
<span class="material-symbols-outlined text-[20px] font-bold">send</span>
</button>
</div>
</div>
</body></html>
