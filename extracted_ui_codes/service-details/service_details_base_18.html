<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Liveness Check Flow 3</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;family=Noto+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f5c619",
                        "primary-hover": "#dcb015",
                        "background-light": "#f8f8f5",
                        "background-dark": "#221e10",
                        "surface-dark": "#2d291c",
                        "muted-gold": "#8a7530",
                    },
                    fontFamily: {
                        "display": ["Manrope", "Noto Sans", "sans-serif"],
                        "body": ["Manrope", "Noto Sans", "sans-serif"],
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                    boxShadow: {
                        'glow': '0 0 20px -5px rgba(245, 198, 25, 0.3)',
                    }
                },
            },
        }
    </script>
<style>
        /* Custom styles for the circular progress */
        .progress-ring__circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
        
        .gold-gradient-text {
            background: linear-gradient(135deg, #f5c619 0%, #e8b000 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Subtle scan animation */
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { top: 100%; opacity: 0; }
        }
        .scan-line {
            animation: scan 3s linear infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white font-display antialiased selection:bg-primary selection:text-black">
<div class="relative flex h-full min-h-screen w-full flex-col overflow-hidden max-w-md mx-auto shadow-2xl bg-background-light dark:bg-background-dark">
<!-- Top App Bar -->
<div class="flex items-center p-4 pb-2 justify-between z-10">
<button class="text-slate-900 dark:text-white flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined" style="font-size: 24px;">arrow_back</span>
</button>
<div class="flex flex-col items-center">
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em]">Identity Verification</h2>
<span class="text-xs font-medium text-slate-500 dark:text-white/60">Step 3 of 3</span>
</div>
<div class="size-12 shrink-0"></div> <!-- Spacer for centering -->
</div>
<!-- Progress Indicators -->
<div class="flex w-full flex-row items-center justify-center gap-2 py-2">
<div class="h-1.5 w-1.5 rounded-full bg-primary/30"></div>
<div class="h-1.5 w-1.5 rounded-full bg-primary/30"></div>
<div class="h-1.5 w-8 rounded-full bg-primary shadow-glow"></div>
</div>
<!-- Main Content Area -->
<div class="flex-1 flex flex-col items-center px-6 pt-4 pb-8 justify-between">
<!-- Text Content -->
<div class="w-full text-center space-y-2">
<h1 class="text-3xl font-extrabold tracking-tight text-slate-900 dark:text-white">
                    Liveness Check
                </h1>
<p class="text-base text-slate-600 dark:text-gray-300 font-medium max-w-[280px] mx-auto leading-relaxed">
                    Please center your face and move your head slowly in a <span class="text-primary font-bold">circle</span>.
                </p>
</div>
<!-- Viewfinder Section -->
<div class="relative my-6 flex items-center justify-center">
<!-- Outer Glow Container -->
<div class="relative size-72 rounded-full flex items-center justify-center">
<!-- Progress Ring SVG -->
<svg class="absolute inset-0 size-full drop-shadow-lg transform rotate-[-90deg]" viewbox="0 0 120 120">
<!-- Track -->
<circle class="text-gray-200 dark:text-white/5" cx="60" cy="60" fill="transparent" r="56" stroke="currentColor" stroke-width="4"></circle>
<!-- Progress (75% filled) -->
<circle class="text-primary drop-shadow-[0_0_8px_rgba(245,198,25,0.6)]" cx="60" cy="60" fill="transparent" r="56" stroke="currentColor" stroke-dasharray="351.86" stroke-dashoffset="88" stroke-linecap="round" stroke-width="4"></circle>
<!-- Top Indicator Dot (Visual cue for starting point) -->
<circle class="drop-shadow-md" cx="60" cy="4" fill="#fff" r="3"></circle>
</svg>
<!-- Camera Feed Mask -->
<div class="size-[260px] rounded-full overflow-hidden border-4 border-transparent relative z-0 bg-slate-800">
<!-- Simulated Camera Feed Image -->
<img alt="Live camera feed showing a person centering their face for verification" class="h-full w-full object-cover opacity-90 scale-110" data-alt="Live camera feed showing a person centering their face for verification" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBE9eGCzJDsj-yIc1YHvAM28s_2IVwmlzC6khl8YG4ljrYJbu_V8-pup2-cg6HCBsIhIDR0VWK0pFJ8HvoG2zc1_OitbpeHVIExbMAryvqR1TD6J1r05vzQiblEhOlHYjVbhXJTuqOI21gF7lxDdByDXfwR--G2oEJObDok7zPknCqn8qmFjCewe_LqbVjtTpRphvkTBT-vDq5O0aTeQPEmv5bNmwdhAbFO56XHDmhnTY_vxA9BYeRdsSgQRMcbrjwpfsmVv_aDAP0"/>
<!-- Overlay Vignette for luxury feel -->
<div class="absolute inset-0 bg-gradient-to-b from-black/20 via-transparent to-black/40"></div>
<!-- Scanning Effect Line -->
<div class="absolute w-full h-[2px] bg-primary/50 shadow-[0_0_15px_rgba(245,198,25,0.8)] scan-line z-10 blur-[1px]"></div>
<!-- Face Guide SVG Overlay -->
<svg class="absolute inset-0 w-full h-full p-8 opacity-30" viewbox="0 0 100 100">
<path d="M20,30 Q20,10 50,10 T80,30 V60 Q80,90 50,90 T20,60 Z" fill="none" stroke="white" stroke-dasharray="4 4" stroke-width="1"></path>
</svg>
</div>
<!-- Dynamic status pill floating over the bottom of the circle -->
<div class="absolute -bottom-4 bg-surface-dark border border-primary/20 backdrop-blur-md px-4 py-1.5 rounded-full shadow-lg flex items-center gap-2">
<span class="relative flex h-2 w-2">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-primary"></span>
</span>
<span class="text-xs font-bold text-primary uppercase tracking-wider">Detecting Face</span>
</div>
</div>
</div>
<!-- Bottom Actions -->
<div class="w-full space-y-5">
<!-- Success Message Container -->
<div class="flex items-center justify-center gap-2 text-primary opacity-90 animate-pulse">
<span class="material-symbols-outlined text-lg">verified_user</span>
<span class="text-sm font-semibold tracking-wide uppercase">Verification in Progress</span>
</div>
<!-- Primary Action Button -->
<button class="w-full group relative flex items-center justify-center gap-3 bg-primary hover:bg-primary-hover active:scale-[0.98] transition-all duration-200 rounded-full h-14 shadow-[0_0_20px_rgba(245,198,25,0.2)] hover:shadow-[0_0_25px_rgba(245,198,25,0.4)]">
<div class="absolute inset-0 rounded-full bg-gradient-to-t from-black/10 to-transparent"></div>
<span class="material-symbols-outlined text-background-dark">camera_enhance</span>
<span class="text-background-dark font-bold text-lg tracking-wide relative z-10">Confirm Selfie</span>
</button>
<p class="text-center text-xs text-slate-500 dark:text-white/30">
                    Your data is encrypted and securely processed.
                </p>
</div>
</div>
</div>
</body></html>
